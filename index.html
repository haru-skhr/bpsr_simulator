<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPSR シミュレーター v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-gold: #fbbf24;
            --accent-pink: #f472b6;
            --accent-green: #4ade80;
            --accent-purple: #a855f7;
            --accent-red: #ef4444;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --group-base-bg: rgba(239, 68, 68, 0.05);
            --group-battle-bg: rgba(56, 189, 248, 0.05);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        .header { text-align: center; margin-bottom: 30px; }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .hero-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--accent-blue);
        }

        .hero-card .label { color: var(--text-dim); font-size: 0.8rem; display: block; margin-bottom: 5px; }
        .hero-card .value { font-size: 1.8rem; font-weight: bold; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-group {
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .group-base { background: var(--group-base-bg); border-color: rgba(239, 68, 68, 0.2); }
        .group-battle { background: var(--group-battle-bg); border-color: rgba(56, 189, 248, 0.2); }

        .group-header {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-blue);
        }

        input[type="number"], select {
            width: 100%;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .ocr-area {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .ocr-area:hover { border-color: var(--accent-blue); background: rgba(56, 189, 248, 0.05); }

        .progress-container {
            display: none;
            margin-top: 10px;
        }
        .progress-bar-bg { width: 100%; height: 6px; background: #0f172a; border-radius: 3px; overflow: hidden; margin-top: 5px;}
        .progress-bar-fill { width: 0%; height: 100%; background: var(--accent-blue); transition: width 0.2s; }

        .pct-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed #334155;
        }
        .pct-val { font-size: 1.1rem; font-weight: bold; }

        .factor-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #475569;
        }

        .factor-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .advice-box {
            margin-top: 20px;
            background: rgba(15, 23, 42, 0.3);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 18px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 18px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 12px; width: 12px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>BPSR シミュレーター v2.0</h1>
        <p style="color:var(--text-dim)">％からの逆算反映・OCR強化版</p>
    </div>

    <div class="hero-stats">
        <div class="hero-card" style="border-color: var(--accent-gold);">
            <span class="label">攻撃速度増加</span>
            <span class="value" id="disp_speed" style="color:var(--accent-gold)">0.00%</span>
        </div>
        <div class="hero-card" style="border-color: var(--accent-blue);">
            <span class="label">与ダメ上昇(万能)</span>
            <span class="value" id="disp_dmg" style="color:var(--accent-blue)">0.00%</span>
        </div>
    </div>

    <div class="main-layout">
        <div class="left-col">
            <div class="section-title">📊 ステータス入力</div>
            
            <div class="ocr-area" onclick="document.getElementById('file-input').click()">
                <div style="font-size:0.9rem; color:var(--text-main);">📷 スクリーンショット読み取り</div>
                <div style="font-size:0.75rem; color:var(--text-dim); margin-top:4px;">実数値または％を自動検出し、実数値へ反映します</div>
                <input type="file" id="file-input" style="display:none" accept="image/*">
                <div id="prog-container" class="progress-container">
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:var(--accent-blue);">
                        <span id="prog-status">解析中...</span>
                        <span id="prog-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg"><div id="prog-fill" class="progress-bar-fill"></div></div>
                </div>
            </div>

            <div class="stat-group group-base">
                <div class="group-header" style="color:var(--accent-red);">🧬 基礎ステータス</div>
                <div class="stat-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="stat-card" style="border-left-color: var(--accent-red);">
                        <label style="font-size:0.7rem; color:var(--text-dim);">筋力</label>
                        <input type="number" id="in_str" value="0" oninput="update()" onfocus="this.select()">
                    </div>
                    <div class="stat-card" style="border-left-color: var(--accent-gold);">
                        <label style="font-size:0.7rem; color:var(--text-dim);">敏捷</label>
                        <input type="number" id="in_agi" value="0" oninput="update()" onfocus="this.select()">
                        <div style="font-size:0.6rem; color:var(--accent-gold); margin-top:2px;">速度寄与:+<span id="agi_to_fast">0</span></div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--accent-purple);">
                        <label style="font-size:0.7rem; color:var(--text-dim);">知力</label>
                        <input type="number" id="in_int" value="0" oninput="update()" onfocus="this.select()">
                    </div>
                </div>
            </div>

            <div class="stat-group group-battle">
                <div class="group-header" style="color:var(--accent-blue);">⚔️ 戦闘ステータス</div>
                <div class="stat-grid">
                    <div class="stat-card" style="border-left-color: var(--accent-pink);">
                        <label style="font-size:0.7rem; color:var(--text-dim);">会心 (実数)</label>
                        <input type="number" id="in_crit" value="0" oninput="update()" onfocus="this.select()">
                        <div class="pct-box"><span class="pct-val" id="out_crit">5.00%</span></div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--accent-blue);">
                        <label style="font-size:0.7rem; color:var(--text-dim);">ファスト (実数)</label>
                        <input type="number" id="in_fast" value="0" oninput="update()" onfocus="this.select()">
                        <div class="pct-box"><span class="pct-val" id="out_fast">0.00%</span></div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--accent-purple);">
                        <label style="font-size:0.7rem; color:var(--text-dim);">器用さ (実数)</label>
                        <input type="number" id="in_dex" value="0" oninput="update()" onfocus="this.select()">
                        <div class="pct-box"><span class="pct-val" id="out_dex">6.00%</span></div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--accent-green);">
                        <label style="font-size:0.7rem; color:var(--text-dim);">幸運 (実数)</label>
                        <input type="number" id="in_luck" value="0" oninput="update()" onfocus="this.select()">
                        <div class="pct-box"><span class="pct-val" id="out_luck">5.00%</span></div>
                    </div>
                    <div class="stat-card" style="border-left-color: var(--accent-gold); grid-column: span 2;">
                        <label style="font-size:0.7rem; color:var(--text-dim);">万能 (実数)</label>
                        <input type="number" id="in_omni" value="0" oninput="update()" onfocus="this.select()">
                        <div class="pct-box"><span class="pct-val" id="out_omni">0.00%</span></div>
                    </div>
                </div>
            </div>

            <div class="stat-card" style="border-left:none; background:rgba(15,23,42,0.5);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-size:0.8rem">ストームブレイド (速度1.6x)</span>
                    <label class="switch"><input type="checkbox" id="toggle_storm" checked onchange="update()"><span class="slider"></span></label>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:0.8rem">武器補正 (幸運+6.0%)</span>
                    <label class="switch"><input type="checkbox" id="toggle_weapon" checked onchange="update()"><span class="slider"></span></label>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="section-title">🧬 因子設定</div>
            <div class="factor-card" id="slots_container"></div>
            <div class="advice-box">
                <h3 style="margin:0 0 10px 0; font-size:0.9rem; color:var(--accent-blue);">システムログ</h3>
                <ul id="log" style="padding-left:15px; margin:0; list-style:none; color:var(--text-dim); font-size:0.75rem; height: 180px; overflow-y: auto;"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    const K_GEN = 19972;
    const K_OMNI = 11200;
    const BASES = { crit: 5.0, fast: 0.0, luck: 5.0, dex: 6.0, omni: 0.0 };
    const FACTOR_DATA = {
        1: { a: 0.0212, b: 0.0106 }, 2: { a: 0.0357, b: 0.0178 }, 3: { a: 0.0502, b: 0.0251 },
        4: { a: 0.0647, b: 0.0323 }, 5: { a: 0.0793, b: 0.0396 }, 6: { a: 0.0904, b: 0.0452 },
        7: { a: 0.1015, b: 0.0507 }, 8: { a: 0.1127, b: 0.0563 }, 9: { a: 0.1238, b: 0.0619 },
        10: { a: 0.1350, b: 0.0675 }
    };
    const TYPES = [
        { id: 'none', label: '--- 未設定 ---' },
        { id: 'X1', label: '極性X1（全属性強度）' }, { id: 'X2', label: '極性X2（筋力）' },
        { id: 'X3', label: '極性X3（知力）' }, { id: 'X4', label: '極性X4（敏捷）' },
        { id: 'X5', label: '極性X5（会心↑/器用↓）' }, { id: 'X6', label: '極性X6（幸運↑/ファスト↓）' },
        { id: 'X7', label: '極性X7（器用↑/幸運↓）' }, { id: 'X8', label: '極性X8（ファスト↑/会心↓）' }
    ];

    function init() {
        const container = document.getElementById('slots_container');
        for(let i=1; i<=3; i++) {
            const div = document.createElement('div');
            div.style.marginBottom = i < 3 ? '20px' : '0';
            div.innerHTML = `
                <label style="font-size:0.75rem; color:var(--text-dim);">因子スロット ${i}</label>
                <div class="factor-row">
                    <select id="type${i}" onchange="update()">
                        ${TYPES.map(t => `<option value="${t.id}">${t.label}</option>`).join('')}
                    </select>
                    <select id="rank${i}" onchange="update()">
                        <option value="0">ランク</option>
                        ${[...Array(10)].map((_, idx) => `<option value="${idx+1}">G${idx+1}</option>`).join('')}
                    </select>
                </div>
            `;
            container.appendChild(div);
        }
        document.getElementById('file-input').addEventListener('change', handleImage);
        update();
    }

    // 逆算ロジック: % から実数値を推定
    function reversePct(pct, k, base) {
        const p = parseFloat(pct) - base;
        if (p <= 0) return 0;
        // p = (raw / (raw + k)) * 100  => raw = (k * p) / (100 - p)
        return Math.round((k * p) / (100 - p));
    }

    async function handleImage(e) {
        const file = e.target.files[0];
        if(!file) return;
        const container = document.getElementById('prog-container');
        const fill = document.getElementById('prog-fill');
        const percentText = document.getElementById('prog-percent');
        const statusText = document.getElementById('prog-status');
        container.style.display = 'block';
        try {
            const result = await Tesseract.recognize(file, 'jpn+eng', {
                logger: m => {
                    if (m.status === 'recognizing') {
                        const p = Math.floor(m.progress * 100);
                        fill.style.width = p + '%';
                        percentText.innerText = p + '%';
                    }
                }
            });
            const text = result.data.text;
            addLog("OCR読み取り完了。逆算反映を開始します。");

            // 数値抽出マップ (実数値 または ％)
            const map = {
                'in_str': /筋力\s*(\d+)/, 'in_int': /知力\s*(\d+)/, 'in_agi': /敏捷\s*(\d+)/,
                'in_dex': [/器用さ\s*(\d+)/, /器用さ\s*([\d\.]+)%/],
                'in_crit': [/会心\s*(\d+)/, /会心\s*([\d\.]+)%/],
                'in_fast': [/ファスト\s*(\d+)/, /ファスト\s*([\d\.]+)%/],
                'in_luck': [/幸運\s*(\d+)/, /幸運\s*([\d\.]+)%/],
                'in_omni': [/万能\s*(\d+)/, /万能\s*([\d\.]+)%/]
            };

            for(let id in map) {
                const patterns = Array.isArray(map[id]) ? map[id] : [map[id]];
                let foundRaw = false;

                // 1. まず実数値を優先して探す
                const matchRaw = text.match(patterns[0]);
                if(matchRaw) {
                    document.getElementById(id).value = matchRaw[1];
                    foundRaw = true;
                }

                // 2. 実数値が見つからず、%パターンがあるなら逆算
                if(!foundRaw && patterns[1]) {
                    const matchPct = text.match(patterns[1]);
                    if(matchPct) {
                        const k = id === 'in_omni' ? K_OMNI : K_GEN;
                        const base = BASES[id.replace('in_','')];
                        const estimated = reversePct(matchPct[1], k, base);
                        document.getElementById(id).value = estimated;
                        addLog(`${id.replace('in_','')}: %から実数${estimated}を逆算反映しました`);
                    }
                }
            }
            setTimeout(() => { container.style.display = 'none'; }, 2000);
            update();
        } catch (err) { addLog("OCR解析エラー: GitHub Pages等で実行してください"); }
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        const li = document.createElement('li');
        li.innerText = "・" + msg;
        log.prepend(li);
    }

    function calcRawPct(raw, k) {
        if (!raw || raw < 0) return 0;
        return Math.floor((raw / (raw + k)) * 10000) / 100;
    }

    function update() {
        const vAgi = parseFloat(document.getElementById('in_agi').value) || 0;
        const vDex = parseFloat(document.getElementById('in_dex').value) || 0;
        const vCrit = parseFloat(document.getElementById('in_crit').value) || 0;
        const vFastBase = parseFloat(document.getElementById('in_fast').value) || 0;
        const vLuck = parseFloat(document.getElementById('in_luck').value) || 0;
        const vOmni = parseFloat(document.getElementById('in_omni').value) || 0;

        const agiAddFast = Math.floor(vAgi * 0.45);
        document.getElementById('agi_to_fast').innerText = agiAddFast;
        const vFast = vFastBase + agiAddFast;

        let mCrit = 1.0, mFast = 1.0, mLuck = 1.0, mDex = 1.0;
        for(let i=1; i<=3; i++) {
            const type = document.getElementById('type'+i).value;
            const rIdx = parseInt(document.getElementById('rank'+i).value);
            if (type === 'none' || rIdx === 0) continue;
            const data = FACTOR_DATA[rIdx];
            switch(type) {
                case 'X5': mCrit += data.a; mDex -= data.b; break;
                case 'X6': mLuck += data.a; mFast -= data.b; break;
                case 'X7': mDex += data.a; mLuck -= data.b; break;
                case 'X8': mFast += data.a; mCrit -= data.b; break;
            }
        }

        const rCrit = Math.max(0, Math.floor((BASES.crit + calcRawPct(vCrit * mCrit, K_GEN)) * 100) / 100);
        const rFast = Math.max(0, Math.floor((BASES.fast + calcRawPct(vFast * mFast, K_GEN)) * 100) / 100);
        const rLuck = Math.max(0, Math.floor((BASES.luck + calcRawPct(vLuck * mLuck, K_GEN) + (document.getElementById('toggle_weapon').checked?6:0)) * 100) / 100);
        const rDex  = Math.max(0, Math.floor((BASES.dex + calcRawPct(vDex * mDex, K_GEN)) * 100) / 100);
        const rOmni = Math.max(0, Math.floor((BASES.omni + calcRawPct(vOmni, K_OMNI)) * 100) / 100);

        document.getElementById('out_crit').innerText = rCrit.toFixed(2) + "%";
        document.getElementById('out_fast').innerText = rFast.toFixed(2) + "%";
        document.getElementById('out_luck').innerText = rLuck.toFixed(2) + "%";
        document.getElementById('out_dex').innerText = rDex.toFixed(2) + "%";
        document.getElementById('out_omni').innerText = rOmni.toFixed(2) + "%";
        document.getElementById('disp_speed').innerText = (rFast * (document.getElementById('toggle_storm').checked ? 1.6 : 1.0)).toFixed(2) + "%";
        document.getElementById('disp_dmg').innerText = (rOmni * 0.35).toFixed(2) + "%";
    }
    init();
</script>
</body>
</html>
