<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPSR シミュレーター</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-gold: #fbbf24;
            --accent-pink: #f472b6;
            --accent-green: #4ade80;
            --accent-purple: #a855f7;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --group-battle-bg: rgba(56, 189, 248, 0.05);
            --group-impact-bg: rgba(168, 85, 247, 0.05);
            --active-glow: rgba(168, 85, 247, 0.15);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        .header { text-align: center; margin-bottom: 20px; }
        
        .hero-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .hero-card {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 10px;
            text-align: left;
            border-left: 4px solid var(--accent-blue);
        }
        .section-title {
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 6px;
            border-bottom: 2px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stat-group {
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-blue);
        }

        /* --- レスポンシブ調整 --- */

        /* スマホ向け (480px以下) */
        @media screen and (max-width: 480px) {
            .header h1 { font-size: 1.25rem; }
            .hero-card { padding: 10px; }
            .hero-card .label { font-size: 0.65rem; margin-bottom: 2px; }
            .hero-card .value { font-size: 1.05rem; }
            .section-title { font-size: 0.9rem; margin-bottom: 10px; }
            .stat-group { padding: 10px; margin-bottom: 12px; }
            .stat-card { padding: 8px; }
            .stat-card label { font-size: 0.6rem !important; }
            .pct-val { font-size: 0.9rem; }
            input[type="number"], select { font-size: 0.85rem; padding: 5px; }
            .switch { width: 32px; height: 16px; }
            .slider:before { height: 10px; width: 10px; left: 3px; bottom: 3px; }
            input:checked + .slider:before { transform: translateX(16px); }
            .switch-row span { font-size: 0.75rem !important; }
        }

        /* PC・タブレット向け (481px以上) */
        @media screen and (min-width: 481px) {
            .header h1 { font-size: 1.8rem; }
            .hero-card { padding: 15px; }
            .hero-card .label { font-size: 0.75rem; margin-bottom: 4px; }
            .hero-card .value { font-size: 1.3rem; }
            .section-title { font-size: 1.1rem; }
            .stat-card { padding: 12px; }
            .stat-card label { font-size: 0.7rem !important; }
            .pct-val { font-size: 1.1rem; }
            input[type="number"], select { font-size: 1rem; padding: 8px; }
            .switch { width: 40px; height: 20px; }
            .slider:before { height: 14px; width: 14px; left: 3px; bottom: 3px; }
            input:checked + .slider:before { transform: translateX(20px); }
            .switch-row span { font-size: 0.85rem !important; }
        }

        /* --- 共通コンポーネント --- */
        .group-battle { background: var(--group-battle-bg); border-color: rgba(56, 189, 248, 0.2); }
        .group-impact { background: var(--group-impact-bg); border-color: rgba(168, 85, 247, 0.2); }
        .group-impact.active { background: var(--active-glow); border-color: var(--accent-purple); }
        .disabled-group { opacity: 0.4; pointer-events: none; filter: grayscale(0.5); }
        
        input[type="number"], select {
            width: 100%;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            box-sizing: border-box;
            border-radius: 4px;
        }

        .pct-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px dashed #334155;
        }
        .pct-val { font-weight: bold; }

        .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .switch-row:last-child { margin-bottom: 0; }

        .switch { position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569; transition: .3s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: "";
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>BPSR シミュレーター</h1>
    </div>

    <div class="hero-stats">
        <div class="hero-card" style="border-left-color: var(--accent-gold);">
            <span class="label">攻撃速度増加</span>
            <span class="value" id="disp_speed" style="color:var(--accent-gold)">0.00%</span>
        </div>
        <div class="hero-card" style="border-left-color: var(--accent-blue);">
            <span class="label">与ダメ上昇(万能)</span>
            <span class="value" id="disp_dmg" style="color:var(--accent-blue)">0.00%</span>
        </div>
    </div>

    <div class="section-title">📊 ステータス入力</div>
    
    <div class="stat-group group-battle">
        <div class="stat-grid">
            <div class="stat-card" style="border-left-color: var(--accent-pink);">
                <label style="color:var(--text-dim);">会心 (実数)</label>
                <input type="number" id="in_crit" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_crit">5.00%</span></div>
            </div>
            <div class="stat-card" style="border-left-color: var(--accent-blue);">
                <label style="color:var(--text-dim);">ファスト (実数)</label>
                <input type="number" id="in_fast" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_fast">0.00%</span></div>
            </div>
            <div class="stat-card" style="border-left-color: var(--accent-green);">
                <label style="color:var(--text-dim);">幸運 (実数)</label>
                <input type="number" id="in_luck" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_luck">5.00%</span></div>
            </div>
            <div class="stat-card" style="border-left-color: var(--accent-purple);">
                <label style="color:var(--text-dim);">器用さ (実数)</label>
                <input type="number" id="in_dex" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_dex">6.00%</span></div>
            </div>
            <div class="stat-card" style="border-left-color: var(--accent-gold); grid-column: span 2;">
                <label style="color:var(--text-dim);">万能 (実数)</label>
                <input type="number" id="in_omni" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_omni">0.00%</span></div>
            </div>
        </div>
    </div>

    <div class="section-title">
        🧬 潜在心相晶：イマジンインパクト
        <label class="switch" style="margin-left:auto;">
            <input type="checkbox" id="toggle_impact_main" onchange="update()">
            <span class="slider"></span>
        </label>
    </div>
    <div class="stat-group group-impact disabled-group" id="impact_section">
        <div class="switch-row">
            <span>固定枠 (幸運最終 +1.0%)</span>
            <span id="fixed_label" style="color:var(--text-dim); font-weight:bold;">停止中</span>
        </div>
        <div class="switch-row" style="margin-top:10px;">
            <span>選択枠 (+1.0～3.0%)</span>
            <div style="display:flex; align-items:center; gap:8px;">
                <select id="impact_val" style="width:65px; padding:3px;" onchange="update()">
                    <option value="1.0">1.0%</option>
                    <option value="2.0">2.0%</option>
                    <option value="3.0">3.0%</option>
                </select>
                <label class="switch">
                    <input type="checkbox" id="toggle_impact_sub" onchange="update()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div class="section-title">⚙️ その他補正</div>
    <div class="stat-group" style="background:rgba(15,23,42,0.4);">
        <div class="switch-row">
            <span>ストームブレイド (速度1.6x)</span>
            <label class="switch">
                <input type="checkbox" id="toggle_storm" onchange="update()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="switch-row">
            <span>武器補正 (幸運+6.0%)</span>
            <label class="switch">
                <input type="checkbox" id="toggle_weapon" onchange="update()">
                <span class="slider"></span>
            </label>
        </div>
    </div>
</div>

<script>
    const K_GEN = 19972;
    const K_OMNI = 11200;
    const BASES = { crit: 5.0, fast: 0.0, luck: 5.0, dex: 6.0, omni: 0.0 };

    function calcRawPct(raw, k) {
        if (!raw || raw < 0) return 0;
        return Math.floor((raw / (raw + k)) * 10000) / 100;
    }

    function update() {
        const isImpactEnabled = document.getElementById('toggle_impact_main').checked;
        const impactSection = document.getElementById('impact_section');
        const fixedLabel = document.getElementById('fixed_label');
        
        if (isImpactEnabled) {
            impactSection.classList.remove('disabled-group');
            impactSection.classList.add('active');
            fixedLabel.style.color = "var(--accent-green)";
            fixedLabel.innerText = "計算中";
        } else {
            impactSection.classList.add('disabled-group');
            impactSection.classList.remove('active');
            fixedLabel.style.color = "var(--text-dim)";
            fixedLabel.innerText = "停止中";
        }

        const vCrit = parseFloat(document.getElementById('in_crit').value) || 0;
        const vFast = parseFloat(document.getElementById('in_fast').value) || 0;
        const vLuck = parseFloat(document.getElementById('in_luck').value) || 0;
        const vDex  = parseFloat(document.getElementById('in_dex').value) || 0;
        const vOmni = parseFloat(document.getElementById('in_omni').value) || 0;

        let extraLuck = 0;
        if (isImpactEnabled) {
            extraLuck += 1.0; 
            if (document.getElementById('toggle_impact_sub').checked) {
                extraLuck += parseFloat(document.getElementById('impact_val').value);
            }
        }
        if (document.getElementById('toggle_weapon').checked) {
            extraLuck += 6.0;
        }

        const rCrit = Math.max(0, Math.floor((BASES.crit + calcRawPct(vCrit, K_GEN)) * 100) / 100);
        const rFast = Math.max(0, Math.floor((BASES.fast + calcRawPct(vFast, K_GEN)) * 100) / 100);
        const rLuck = Math.max(0, Math.floor((BASES.luck + calcRawPct(vLuck, K_GEN) + extraLuck) * 100) / 100);
        const rDex  = Math.max(0, Math.floor((BASES.dex + calcRawPct(vDex, K_GEN)) * 100) / 100);
        const rOmni = Math.max(0, Math.floor((BASES.omni + calcRawPct(vOmni, K_OMNI)) * 100) / 100);

        document.getElementById('out_crit').innerText = rCrit.toFixed(2) + "%";
        document.getElementById('out_fast').innerText = rFast.toFixed(2) + "%";
        document.getElementById('out_luck').innerText = rLuck.toFixed(2) + "%";
        document.getElementById('out_dex').innerText = rDex.toFixed(2) + "%";
        document.getElementById('out_omni').innerText = rOmni.toFixed(2) + "%";
        
        document.getElementById('disp_speed').innerText = (rFast * (document.getElementById('toggle_storm').checked ? 1.6 : 1.0)).toFixed(2) + "%";
        document.getElementById('disp_dmg').innerText = (rOmni * 0.35).toFixed(2) + "%";
    }
    
    update();
</script>
</body>
</html>
