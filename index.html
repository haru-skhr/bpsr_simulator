<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPSR シミュレーター</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-gold: #fbbf24;
            --accent-pink: #f472b6;
            --accent-green: #4ade80;
            --accent-purple: #a855f7;
            --accent-red: #ef4444;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --group-battle-bg: rgba(56, 189, 248, 0.05);
            --group-buff-bg: rgba(251, 191, 36, 0.05);
            --group-imagine-bg: rgba(56, 189, 248, 0.08);
            --active-glow: rgba(168, 85, 247, 0.3);
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 600px; background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .header { text-align: center; margin-bottom: 20px; }
        .hero-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .hero-card { background: rgba(15, 23, 42, 0.4); border-radius: 10px; border-left: 4px solid var(--accent-blue); padding: 15px; }
        .hero-card .label { font-size: 0.75rem; color: var(--text-dim); display: block; margin-bottom: 4px; }
        .hero-card .value { font-size: 1.3rem; font-weight: bold; }

        .section-title { font-weight: bold; margin-bottom: 15px; padding-bottom: 6px; border-bottom: 2px solid #334155; display: flex; align-items: center; gap: 10px; font-size: 1.1rem; }
        .stat-group { border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: rgba(15, 23, 42, 0.4); padding: 10px; border-radius: 8px; border-left: 4px solid var(--accent-blue); position: relative; }

        .bonus-badge { display: none; position: absolute; top: 5px; right: 5px; background: var(--accent-gold); color: #000; font-size: 0.6rem; font-weight: bold; padding: 2px 5px; border-radius: 4px; }
        .class-bonus-badge { display: none; position: absolute; bottom: 5px; right: 5px; background: var(--accent-pink); color: #fff; font-size: 0.6rem; padding: 1px 4px; border-radius: 4px; }

        .buff-card { background: rgba(15, 23, 42, 0.4); padding: 8px 12px; border-radius: 8px; border-left: 4px solid var(--accent-gold); display: flex; flex-direction: column; gap: 4px; }
        .imagine-slot { background: rgba(15, 23, 42, 0.4); padding: 10px; border-radius: 8px; border: 1px solid #334155; }
        .active-btn { width: 100%; padding: 6px; margin-top: 8px; border: 1px solid #475569; background: #0f172a; color: var(--text-dim); border-radius: 4px; font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .active-btn.active { background: var(--accent-purple); color: #fff; border-color: var(--accent-purple); box-shadow: 0 0 10px var(--active-glow); }

        input[type="number"], select { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; box-sizing: border-box; border-radius: 4px; padding: 8px; }
        .pct-box { margin-top: 5px; padding-top: 5px; border-top: 1px dashed #334155; }
        .pct-val { font-weight: bold; color: var(--accent-green); font-size: 1.0rem; }

        .switch-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(20px); }
        .disabled-group { opacity: 0.4; pointer-events: none; }

        /* 保存ボタンエリア */
        .storage-controls { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .storage-btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .save-btn { background: var(--accent-green); color: #0f172a; }
        .clear-btn { background: #475569; color: white; }
        .storage-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>BPSR シミュレーター</h1></div>

    <div class="hero-stats">
        <div class="hero-card" style="border-left-color: var(--accent-gold);">
            <span class="label">攻撃速度 (SPD)</span>
            <span class="value" id="disp_speed" style="color:var(--accent-gold)">0.00%</span>
        </div>
        <div class="hero-card" style="border-left-color: var(--accent-blue);">
            <span class="label">与ダメ上昇 (万能)</span>
            <span class="value" id="disp_dmg" style="color:var(--accent-blue)">0.00%</span>
        </div>
    </div>

    <div class="section-title">🛡️ クラス補正</div>
    <div class="stat-group" style="background:rgba(56, 189, 248, 0.1);">
        <div class="switch-row">
            <span>使用クラス</span>
            <select id="class_select" style="width:180px;" onchange="update()">
                <option value="none" selected>指定なし</option>
                <option value="storm">ストームブレイド</option>
                <option value="frost">フロストメイジ</option>
            </select>
        </div>
    </div>

    <div class="section-title">📊 ステータス入力</div>
    <div class="stat-group" style="background: var(--group-battle-bg);">
        <div class="stat-grid">
            <div class="stat-card" style="border-left-color: var(--accent-pink);">
                <div id="bonus_crit" class="bonus-badge">1位ボーナス</div>
                <div id="class_crit" class="class-bonus-badge">メイジ+3.5%</div>
                <label style="color:var(--text-dim); font-size: 0.7rem;">会心 (実数)</label>
                <input type="number" id="in_crit" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_crit">5.00% (0)</span></div>
            </div>
            <div class="stat-card" style="border-left-color: var(--accent-blue);">
                <div id="bonus_fast" class="bonus-badge">1位ボーナス</div>
                <div id="class_fast" class="class-bonus-badge">メイジ+3.5%</div>
                <label style="color:var(--text-dim); font-size: 0.7rem;">ファスト (実数)</label>
                <input type="number" id="in_fast" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_fast">0.00% (0)</span></div>
            </div>
            <div class="stat-card" style="border-left-color: var(--accent-green);">
                <div id="bonus_luck" class="bonus-badge">1位ボーナス</div>
                <div id="class_luck" class="class-bonus-badge">メイジ+3.5%</div>
                <label style="color:var(--text-dim); font-size: 0.7rem;">幸運 (実数)</label>
                <input type="number" id="in_luck" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_luck">5.00% (0)</span></div>
            </div>
            <div class="stat-card" style="border-left-color: var(--accent-purple);">
                <div id="bonus_dex" class="bonus-badge">1位ボーナス</div>
                <div id="class_dex" class="class-bonus-badge">メイジ+3.5%</div>
                <label style="color:var(--text-dim); font-size: 0.7rem;">器用さ (実数)</label>
                <input type="number" id="in_dex" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_dex">6.00% (0)</span></div>
            </div>
        </div>
        <div class="stat-card" style="border-left-color: var(--accent-gold); margin-top: 10px;">
            <div id="bonus_omni" class="bonus-badge">1位ボーナス</div>
            <div id="class_omni" class="class-bonus-badge">メイジ+3.5%</div>
            <label style="color:var(--text-dim); font-size: 0.7rem;">万能 (実数)</label>
            <input type="number" id="in_omni" value="0" oninput="update()" onfocus="this.select()">
            <div class="pct-box"><span class="pct-val" id="out_omni">0.00% (0)</span></div>
        </div>
    </div>

    <div class="section-title">💎 装備補正</div>
    <div class="stat-group" style="background: var(--group-buff-bg);">
        <div class="stat-grid">
            <div class="buff-card"><label>耳飾り(速%)</label><select id="buff_ear" onchange="update()"><option value="0">0%</option><option value="1">1%</option><option value="1.5">1.5%</option><option value="2">2%</option></select></div>
            <div class="buff-card"><label>首飾り(速%)</label><select id="buff_neck" onchange="update()"><option value="0">0%</option><option value="1">1%</option><option value="1.5">1.5%</option><option value="2">2%</option></select></div>
            <div class="buff-card"><label>指輪(速%)</label><select id="buff_ring" onchange="update()"><option value="0">0%</option><option value="1">1%</option><option value="1.5">1.5%</option><option value="2">2%</option></select></div>
            <div class="buff-card"><label>護符(速%)</label><select id="buff_talisman" onchange="update()"><option value="0">0%</option><option value="1">1%</option><option value="1.5">1.5%</option><option value="2">2%</option></select></div>
        </div>
        <div class="stat-grid" style="margin-top: 10px;">
            <div class="buff-card"><label>武器(速%)</label><select id="buff_weapon_spd" onchange="update()"><option value="0">0%</option><option value="2.5">2.5%</option><option value="3">3%</option><option value="3.5">3.5%</option></select></div>
            <div class="buff-card" style="border-left-color: var(--accent-red);"><label>赤武器 (幸運+6%)</label><select id="buff_red_weapon" onchange="update()"><option value="0">なし</option><option value="6">あり</option></select></div>
        </div>
    </div>

    <div class="section-title">⚔️ バトルイマジン</div>
    <div class="stat-group" style="background: var(--group-imagine-bg);">
        <div class="stat-grid">
            <div class="imagine-slot"><select id="sel_slotA" onchange="onImagineTypeChange('slotA')"><option value="">― Slot A ―</option><option value="mukboss">ムークボス (会心)</option><option value="heaven">ヘヴンスカイ (速度)</option></select><select id="grade_slotA" onchange="update()" style="margin-top:5px; font-size:0.8rem; color:var(--accent-gold);"></select><button id="btn_slotA" class="active-btn" onclick="toggleBtn('slotA')">OFF</button></div>
            <div class="imagine-slot"><select id="sel_slotB" onchange="onImagineTypeChange('slotB')"><option value="">― Slot B ―</option><option value="mukboss">ムークボス (会心)</option><option value="heaven">ヘヴンスカイ (速度)</option></select><select id="grade_slotB" onchange="update()" style="margin-top:5px; font-size:0.8rem; color:var(--accent-gold);"></select><button id="btn_slotB" class="active-btn" onclick="toggleBtn('slotB')">OFF</button></div>
        </div>
    </div>

    <div class="section-title">🧬 イマジンインパクト</div>
    <div class="stat-group">
        <div class="switch-row"><span>有効化スイッチ</span><label class="switch"><input type="checkbox" id="toggle_impact_main" onchange="update()"><span class="slider"></span></label></div>
        <div id="impact_section" class="disabled-group">
            <div class="switch-row"><span>幸運固定バフ (+1.0%)</span><span style="color:var(--accent-green); font-size:0.8rem;">自動適用</span></div>
            <div class="switch-row"><span>幸運選択バフ (+1.0～3.0%)</span><div style="display:flex; align-items:center; gap:8px;"><select id="impact_val" style="width:65px; padding:3px;" onchange="update()"><option value="1.0">1.0</option><option value="2.0">2.0</option><option value="3.0">3.0</option></select><label class="switch"><input type="checkbox" id="toggle_impact_sub" onchange="update()"><span class="slider"></span></label></div></div>
        </div>
    </div>

    <div class="section-title">🧪 潜在心相晶：因子</div>
    <div class="stat-group" style="background: rgba(168, 85, 247, 0.08);">
        <div class="stat-grid">
            <div class="buff-card" style="border-left-color: var(--accent-purple);">
                <label style="color:var(--text-dim); font-size: 0.7rem;">極性X5 (会心系)</label>
                <select id="factor_x5" onchange="update()">
                    <option value="none">なし</option>
                    <option value="g5">G5 (+6.38% / -3.83%)</option>
                    <option value="g7">G7 (+7.83% / -4.70%)</option>
                    <option value="g10">G10 (+10.0% / -5.0%)</option>
                </select>
            </div>
            <div class="buff-card" style="border-left-color: var(--accent-purple);">
                <label style="color:var(--text-dim); font-size: 0.7rem;">極性X6 (幸運系)</label>
                <select id="factor_x6" onchange="update()">
                    <option value="none">なし</option>
                    <option value="g5">G5 (+6.38% / -3.83%)</option>
                    <option value="g7">G7 (+7.83% / -4.70%)</option>
                    <option value="g10">G10 (+10.0% / -5.0%)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="storage-controls">
        <button class="storage-btn save-btn" onclick="saveData()">💾 構成を保存</button>
        <button class="storage-btn clear-btn" onclick="clearData()">🔄 リセット</button>
    </div>
</div>

<script>
    const K_GEN = 19972;
    const K_OMNI = 11200;
    const BASES = { crit: 5.0, fast: 0.0, luck: 5.0, dex: 6.0, omni: 0.0 };
    const IMAGINE_DATA = {
        mukboss: { label: '会心', target: 'crit', unit: '', values: [2240, 2688, 3136, 3584, 4032, 4480] },
        heaven: { label: '速度', target: 'fast', unit: '%', values: [10.0, 12.0, 14.0, 16.0, 18.0, 20.0] }
    };
    const FACTOR_DATA = {
        x5: { none: { crit: 0, dex: 0 }, g5: { crit: 0.0638, dex: -0.0383 }, g7: { crit: 0.0783, dex: -0.0470 }, g10: { crit: 0.10, dex: -0.05 } },
        x6: { none: { luck: 0, fast: 0 }, g5: { luck: 0.0638, fast: -0.0383 }, g7: { luck: 0.0783, fast: -0.0470 }, g10: { luck: 0.10, fast: -0.05 } }
    };

    function floor2(n) { return Math.floor(n * 100) / 100; }

    function onImagineTypeChange(slotId) {
        const type = document.getElementById('sel_' + slotId).value;
        const gradeSelect = document.getElementById('grade_' + slotId);
        gradeSelect.innerHTML = '';
        if (type) {
            const data = IMAGINE_DATA[type];
            data.values.forEach((val, idx) => {
                const opt = document.createElement('option');
                opt.value = idx; opt.innerText = `G${idx}：${data.label} ${val}${data.unit}`;
                if (idx === 5) opt.selected = true;
                gradeSelect.appendChild(opt);
            });
        }
        update();
    }

    function toggleBtn(id) {
        const btn = document.getElementById('btn_' + id);
        btn.classList.toggle('active');
        btn.innerText = btn.classList.contains('active') ? 'ACTIVE ON' : 'OFF';
        update();
    }

    function update() {
        const activeClass = document.getElementById('class_select').value;
        const isImpact = document.getElementById('toggle_impact_main').checked;
        document.getElementById('impact_section').classList.toggle('disabled-group', !isImpact);

        const fx5 = FACTOR_DATA.x5[document.getElementById('factor_x5').value];
        const fx6 = FACTOR_DATA.x6[document.getElementById('factor_x6').value];
        const f = { crit: fx5.crit, dex: fx5.dex, luck: fx6.luck, fast: fx6.fast, omni: 0 };

        const rawInputs = {
            crit: parseFloat(document.getElementById('in_crit').value) || 0,
            fast: parseFloat(document.getElementById('in_fast').value) || 0,
            luck: parseFloat(document.getElementById('in_luck').value) || 0,
            dex:  parseFloat(document.getElementById('in_dex').value) || 0,
            omni: parseFloat(document.getElementById('in_omni').value) || 0
        };

        let baseMaxKey = 'crit';
        for (let k in rawInputs) { if (rawInputs[k] > rawInputs[baseMaxKey]) baseMaxKey = k; }

        let ex = { crit: 0, fast: 0, luck: 0, dex: 0, omni: 0 };
        ['slotA', 'slotB'].forEach(slot => {
            const type = document.getElementById('sel_' + slot).value;
            const active = document.getElementById('btn_' + slot).classList.contains('active');
            const grade = parseInt(document.getElementById('grade_' + slot).value);
            if (type && active && IMAGINE_DATA[type].unit === '') {
                ex[IMAGINE_DATA[type].target] += IMAGINE_DATA[type].values[grade];
            }
        });

        let combinedRaw = {};
        for (let k in rawInputs) {
            combinedRaw[k] = (rawInputs[k] / (1 + f[k])) + ex[k];
        }
        let finalMaxKey = baseMaxKey;
        let currentMaxVal = combinedRaw[baseMaxKey];
        for (let k in combinedRaw) {
            if (combinedRaw[k] > currentMaxVal) {
                currentMaxVal = combinedRaw[k];
                finalMaxKey = k;
            }
        }

        let finalStatusRaw = {};
        for (let k in rawInputs) {
            let base = combinedRaw[k] * (1 + f[k]);
            if (finalMaxKey !== baseMaxKey) {
                if (k === baseMaxKey) base -= 800 * (1 + f[k]);
                if (k === finalMaxKey) base += 800 * (1 + f[k]);
            }
            finalStatusRaw[k] = Math.round(base);
        }

        let r = {
            crit: BASES.crit + (finalStatusRaw.crit / (finalStatusRaw.crit + K_GEN) * 100),
            fast: BASES.fast + (finalStatusRaw.fast / (finalStatusRaw.fast + K_GEN) * 100),
            luck: BASES.luck + (finalStatusRaw.luck / (finalStatusRaw.luck + K_GEN) * 100),
            dex:  BASES.dex  + (finalStatusRaw.dex  / (finalStatusRaw.dex  + K_GEN) * 100),
            omni: BASES.omni + (finalStatusRaw.omni / (finalStatusRaw.omni + K_OMNI) * 100)
        };

        let topPctKey = 'crit';
        for (let k in r) { if(r[k] > r[topPctKey]) topPctKey = k; }
        if (activeClass === 'frost') r[topPctKey] += 3.5;

        ['slotA', 'slotB'].forEach(slot => {
            const type = document.getElementById('sel_' + slot).value;
            const active = document.getElementById('btn_' + slot).classList.contains('active');
            const grade = parseInt(document.getElementById('grade_' + slot).value);
            if (type === 'heaven' && active) r.fast += IMAGINE_DATA.heaven.values[grade];
        });
        r.luck += parseFloat(document.getElementById('buff_red_weapon').value) || 0;
        if (isImpact) {
            r.luck += 1.0;
            if (document.getElementById('toggle_impact_sub').checked) r.luck += parseFloat(document.getElementById('impact_val').value);
        }

        ['crit', 'fast', 'luck', 'dex', 'omni'].forEach(k => {
            document.getElementById('out_' + k).innerText = floor2(r[k]).toFixed(2) + "% (" + finalStatusRaw[k] + ")";
            document.getElementById('bonus_' + k).style.display = (k === finalMaxKey) ? 'block' : 'none';
            document.getElementById('class_' + k).style.display = (activeClass === 'frost' && k === topPctKey) ? 'block' : 'none';
        });

        const equipSpd = (parseFloat(document.getElementById('buff_ear').value)||0) + (parseFloat(document.getElementById('buff_neck').value)||0) + (parseFloat(document.getElementById('buff_ring').value)||0) + (parseFloat(document.getElementById('buff_talisman').value)||0) + (parseFloat(document.getElementById('buff_weapon_spd').value)||0);
        let ratio = (activeClass === 'storm') ? 1.6 : (activeClass === 'frost' ? 0.2 : 0.6);
        document.getElementById('disp_speed').innerText = floor2((r.fast * ratio) + equipSpd).toFixed(2) + "%";
        document.getElementById('disp_dmg').innerText = floor2(r.omni * 0.35).toFixed(2) + "%";
    }

    // --- ローカルストレージ機能 ---
    function saveData() {
        const data = {
            class: document.getElementById('class_select').value,
            inputs: {
                crit: document.getElementById('in_crit').value,
                fast: document.getElementById('in_fast').value,
                luck: document.getElementById('in_luck').value,
                dex: document.getElementById('in_dex').value,
                omni: document.getElementById('in_omni').value
            },
            equip: {
                ear: document.getElementById('buff_ear').value,
                neck: document.getElementById('buff_neck').value,
                ring: document.getElementById('buff_ring').value,
                talisman: document.getElementById('buff_talisman').value,
                weapon_spd: document.getElementById('buff_weapon_spd').value,
                red_weapon: document.getElementById('buff_red_weapon').value
            },
            imagine: {
                slotA_type: document.getElementById('sel_slotA').value,
                slotA_grade: document.getElementById('grade_slotA').value,
                slotA_active: document.getElementById('btn_slotA').classList.contains('active'),
                slotB_type: document.getElementById('sel_slotB').value,
                slotB_grade: document.getElementById('grade_slotB').value,
                slotB_active: document.getElementById('btn_slotB').classList.contains('active')
            },
            impact: {
                main: document.getElementById('toggle_impact_main').checked,
                val: document.getElementById('impact_val').value,
                sub: document.getElementById('toggle_impact_sub').checked
            },
            factors: {
                x5: document.getElementById('factor_x5').value,
                x6: document.getElementById('factor_x6').value
            }
        };
        localStorage.setItem('bpsr_config', JSON.stringify(data));
        alert('現在の構成をブラウザに保存しました。');
    }

    function loadData() {
        const saved = localStorage.getItem('bpsr_config');
        if (!saved) return;
        const data = JSON.parse(saved);

        document.getElementById('class_select').value = data.class;
        for (let k in data.inputs) document.getElementById('in_' + k).value = data.inputs[k];
        document.getElementById('buff_ear').value = data.equip.ear;
        document.getElementById('buff_neck').value = data.equip.neck;
        document.getElementById('buff_ring').value = data.equip.ring;
        document.getElementById('buff_talisman').value = data.equip.talisman;
        document.getElementById('buff_weapon_spd').value = data.equip.weapon_spd;
        document.getElementById('buff_red_weapon').value = data.equip.red_weapon;

        // イマジン復元
        document.getElementById('sel_slotA').value = data.imagine.slotA_type;
        onImagineTypeChange('slotA');
        document.getElementById('grade_slotA').value = data.imagine.slotA_grade;
        if (data.imagine.slotA_active) document.getElementById('btn_slotA').classList.add('active');
        
        document.getElementById('sel_slotB').value = data.imagine.slotB_type;
        onImagineTypeChange('slotB');
        document.getElementById('grade_slotB').value = data.imagine.slotB_grade;
        if (data.imagine.slotB_active) document.getElementById('btn_slotB').classList.add('active');

        document.getElementById('toggle_impact_main').checked = data.impact.main;
        document.getElementById('impact_val').value = data.impact.val;
        document.getElementById('toggle_impact_sub').checked = data.impact.sub;

        document.getElementById('factor_x5').value = data.factors.x5;
        document.getElementById('factor_x6').value = data.factors.x6;

        update();
    }

    function clearData() {
        if(confirm('保存されたデータを削除し、初期状態に戻しますか？')) {
            localStorage.removeItem('bpsr_config');
            location.reload();
        }
    }

    // 初期化
    onImagineTypeChange('slotA'); onImagineTypeChange('slotB');
    loadData(); // 保存データがあれば読み込み
    update();
</script>
</body>
</html>
