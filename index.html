<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPSR ステータスシミュレーター v0.7</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-gold: #fbbf24;
            --accent-pink: #f472b6;
            --accent-green: #4ade80;
            --accent-purple: #a855f7;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .hero-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--accent-blue);
        }

        .hero-card .label { color: var(--text-dim); font-size: 0.8rem; display: block; margin-bottom: 5px; }
        .hero-card .value { font-size: 1.8rem; font-weight: bold; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(51, 65, 85, 0.4);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-blue);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .stat-name { font-weight: bold; font-size: 1.1rem; }
        .stat-base { font-size: 0.8rem; color: var(--text-dim); }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-area label { font-size: 0.75rem; color: var(--text-dim); }

        input[type="number"] {
            width: 100%;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: #1e293b;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            background: rgba(15, 23, 42, 0.3);
            padding: 8px;
            border-radius: 6px;
        }
        .toggle-label { font-size: 0.75rem; color: var(--text-dim); }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(20px); }

        .pct-display {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .pct-val { font-size: 1.5rem; font-weight: bold; color: var(--text-main); }
        .pct-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; }

        .advice-box {
            background: rgba(15, 23, 42, 0.3);
            padding: 20px;
            border-radius: 8px;
        }

        .advice-box h3 { margin-top: 0; color: var(--accent-blue); font-size: 1.1rem; }
        #advice_list { font-size: 0.9rem; list-style: none; padding: 0; margin: 0; }
        #advice_list li { margin-bottom: 10px; padding-left: 20px; position: relative; }
        #advice_list li::before { content: "◆"; position: absolute; left: 0; color: var(--accent-blue); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>BPSR ステータスシミュレーター v0.7</h1>
    </div>

    <div class="hero-stats">
        <div class="hero-card" style="border-color: var(--accent-gold);">
            <span class="label">攻撃速度増加</span>
            <span class="value" id="disp_speed" style="color:var(--accent-gold)">0.00%</span>
        </div>
        <div class="hero-card" style="border-color: var(--accent-blue);">
            <span class="label">与ダメ上昇(万能)</span>
            <span class="value" id="disp_dmg" style="color:var(--accent-blue)">0.00%</span>
        </div>
    </div>

    <div class="stat-grid">
        <!-- 会心 -->
        <div class="stat-card" style="border-left-color: var(--accent-pink);">
            <div class="stat-header">
                <span class="stat-name" style="color:var(--accent-pink)">会心</span>
                <span class="stat-base">基本 5.0%</span>
            </div>
            <div class="input-area">
                <label>合計実数値</label>
                <input type="number" id="in_crit" value="0" oninput="update()" onfocus="this.select()">
            </div>
            <div class="pct-display">
                <span class="pct-label">表記合計値</span>
                <span class="pct-val" id="out_crit">5.00%</span>
            </div>
        </div>

        <!-- ファスト -->
        <div class="stat-card" style="border-left-color: var(--accent-blue);">
            <div class="stat-header">
                <span class="stat-name" style="color:var(--accent-blue)">ファスト</span>
                <span class="stat-base">基本 0.0%</span>
            </div>
            <div class="input-area">
                <label>合計実数値</label>
                <input type="number" id="in_fast" value="0" oninput="update()" onfocus="this.select()">
                <div class="toggle-row">
                    <span class="toggle-label">ストームブレイド(1.6x)</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle_storm" checked onchange="update()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="pct-display">
                <span class="pct-label">表記合計値</span>
                <span class="pct-val" id="out_fast">0.00%</span>
            </div>
        </div>

        <!-- 幸運 -->
        <div class="stat-card" style="border-left-color: var(--accent-green);">
            <div class="stat-header">
                <span class="stat-name" style="color:var(--accent-green)">幸運</span>
                <span class="stat-base">基本 5.0%</span>
            </div>
            <div class="input-area">
                <label>合計実数値</label>
                <input type="number" id="in_luck" value="0" oninput="update()" onfocus="this.select()">
                <div class="toggle-row">
                    <span class="toggle-label">武器補正 (+6%)</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle_weapon" checked onchange="update()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="pct-display">
                <span class="pct-label">表記合計値</span>
                <span class="pct-val" id="out_luck">11.00%</span>
            </div>
        </div>

        <!-- 器用さ -->
        <div class="stat-card" style="border-left-color: var(--accent-purple);">
            <div class="stat-header">
                <span class="stat-name" style="color:var(--accent-purple)">器用さ</span>
                <span class="stat-base">基本 6.0%</span>
            </div>
            <div class="input-area">
                <label>合計実数値</label>
                <input type="number" id="in_dex" value="0" oninput="update()" onfocus="this.select()">
            </div>
            <div class="pct-display">
                <span class="pct-label">表記合計値</span>
                <span class="pct-val" id="out_dex">6.00%</span>
            </div>
        </div>

        <!-- 万能 -->
        <div class="stat-card" style="border-left-color: var(--accent-gold);">
            <div class="stat-header">
                <span class="stat-name" style="color:var(--accent-gold)">万能</span>
                <span class="stat-base">基本 0.0%</span>
            </div>
            <div class="input-area">
                <label>合計実数値</label>
                <input type="number" id="in_omni" value="0" oninput="update()" onfocus="this.select()">
            </div>
            <div class="pct-display">
                <span class="pct-label">表記合計値</span>
                <span class="pct-val" id="out_omni">0.00%</span>
            </div>
        </div>
    </div>

    <div class="advice-box">
        <h3>シミュレーター診断 (v0.7)</h3>
        <ul id="advice_list"></ul>
    </div>
</div>

<script>
    const K_GEN = 19972;
    const K_OMNI = 11200;
    const BASES = { crit: 5.0, fast: 0.0, luck: 5.0, dex: 6.0, omni: 0.0 };

    function calc(raw, k, base, extraPct = 0) {
        if (!raw || raw < 0) return base + extraPct;
        const calcPart = Math.floor((raw / (raw + k)) * 10000) / 100;
        return Math.floor((base + calcPart + extraPct) * 100) / 100;
    }

    function update() {
        const vCrit = parseFloat(document.getElementById('in_crit').value) || 0;
        const vFast = parseFloat(document.getElementById('in_fast').value) || 0;
        const vLuck = parseFloat(document.getElementById('in_luck').value) || 0;
        const vDex = parseFloat(document.getElementById('in_dex').value) || 0;
        const vOmni = parseFloat(document.getElementById('in_omni').value) || 0;

        const isStorm = document.getElementById('toggle_storm').checked;
        const hasWeaponBonus = document.getElementById('toggle_weapon').checked;

        const rCrit = calc(vCrit, K_GEN, BASES.crit);
        const rFast = calc(vFast, K_GEN, BASES.fast);
        const rLuck = calc(vLuck, K_GEN, BASES.luck, hasWeaponBonus ? 6 : 0);
        const rDex = calc(vDex, K_GEN, BASES.dex);
        const rOmni = calc(vOmni, K_OMNI, BASES.omni);

        document.getElementById('out_crit').innerText = rCrit.toFixed(2) + "%";
        document.getElementById('out_fast').innerText = rFast.toFixed(2) + "%";
        document.getElementById('out_luck').innerText = rLuck.toFixed(2) + "%";
        document.getElementById('out_dex').innerText = rDex.toFixed(2) + "%";
        document.getElementById('out_omni').innerText = rOmni.toFixed(2) + "%";

        // 攻撃速度計算
        const speedMultiplier = isStorm ? 1.6 : 1.0;
        const speedPct = rFast * speedMultiplier;
        document.getElementById('disp_speed').innerText = speedPct.toFixed(2) + "%";
        
        // 万能：与ダメ上昇
        const dmgPct = rOmni * 0.35;
        document.getElementById('disp_dmg').innerText = dmgPct.toFixed(2) + "%";

        // アドバイス更新
        const list = document.getElementById('advice_list');
        list.innerHTML = "";
        list.innerHTML += `<li>計算前提: K=${K_GEN} (ファスト・会心・幸運・器用さ)</li>`;
        
        if (rFast < 35) {
            const req = Math.ceil((35 * K_GEN) / 65) - vFast;
            list.innerHTML += `<li>ファスト35%まで、あと実数値 <strong>${req > 0 ? req : 0}</strong> 必要です。</li>`;
        } else {
            list.innerHTML += `<li>ファスト35%突破！(攻撃速度増加は ${ (35 * speedMultiplier).toFixed(2) }% で最大)</li>`;
        }
        
        if (vCrit < 500 && vCrit > 0) {
            list.innerHTML += `<li>会心は実数値を少し盛るだけで効率よく伸びる段階です。</li>`;
        }
    }

    update();
</script>
</body>
</html>
