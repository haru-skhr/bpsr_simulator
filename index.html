<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPSR シミュレーター v2.4</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-gold: #fbbf24;
            --accent-pink: #f472b6;
            --accent-green: #4ade80;
            --accent-purple: #a855f7;
            --accent-red: #ef4444;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --group-battle-bg: rgba(56, 189, 248, 0.05);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        .header { text-align: center; margin-bottom: 30px; }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .hero-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--accent-blue);
        }

        .hero-card .label { color: var(--text-dim); font-size: 0.8rem; display: block; margin-bottom: 5px; }
        .hero-card .value { font-size: 1.8rem; font-weight: bold; }

        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-group {
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            background: var(--group-battle-bg);
            border-color: rgba(56, 189, 248, 0.2);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-blue);
        }

        input[type="number"] {
            width: 100%;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .pct-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed #334155;
        }
        .pct-val { font-size: 1.1rem; font-weight: bold; }

        .switch-group {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .switch-row:last-child { margin-bottom: 0; }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569;
            transition: .3s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(20px); }

        .info-box {
            background: rgba(15, 23, 42, 0.3);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>BPSR シミュレーター v2.4</h1>
        <p style="color:var(--text-dim)">UI最適化・実数入力版</p>
    </div>

    <div class="hero-stats">
        <div class="hero-card" style="border-color: var(--accent-gold);">
            <span class="label">攻撃速度増加</span>
            <span class="value" id="disp_speed" style="color:var(--accent-gold)">0.00%</span>
        </div>
        <div class="hero-card" style="border-color: var(--accent-blue);">
            <span class="label">与ダメ上昇(万能)</span>
            <span class="value" id="disp_dmg" style="color:var(--accent-blue)">0.00%</span>
        </div>
    </div>

    <div class="section-title">📊 ステータス入力</div>
    
    <div class="stat-group">
        <div class="stat-grid">
            <!-- 会心 -->
            <div class="stat-card" style="border-left-color: var(--accent-pink);">
                <label style="font-size:0.7rem; color:var(--text-dim);">会心 (実数)</label>
                <input type="number" id="in_crit" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_crit">5.00%</span></div>
            </div>
            <!-- ファスト -->
            <div class="stat-card" style="border-left-color: var(--accent-blue);">
                <label style="font-size:0.7rem; color:var(--text-dim);">ファスト (実数)</label>
                <input type="number" id="in_fast" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_fast">0.00%</span></div>
            </div>
            <!-- 幸運 -->
            <div class="stat-card" style="border-left-color: var(--accent-green);">
                <label style="font-size:0.7rem; color:var(--text-dim);">幸運 (実数)</label>
                <input type="number" id="in_luck" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_luck">5.00%</span></div>
            </div>
            <!-- 器用さ -->
            <div class="stat-card" style="border-left-color: var(--accent-purple);">
                <label style="font-size:0.7rem; color:var(--text-dim);">器用さ (実数)</label>
                <input type="number" id="in_dex" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_dex">6.00%</span></div>
            </div>
            <!-- 万能 -->
            <div class="stat-card" style="border-left-color: var(--accent-gold); grid-column: span 2;">
                <label style="font-size:0.7rem; color:var(--text-dim);">万能 (実数)</label>
                <input type="number" id="in_omni" value="0" oninput="update()" onfocus="this.select()">
                <div class="pct-box"><span class="pct-val" id="out_omni">0.00%</span></div>
            </div>
        </div>
    </div>

    <div class="switch-group">
        <div class="switch-row">
            <span style="font-size:0.8rem">ストームブレイド (速度1.6x)</span>
            <label class="switch">
                <input type="checkbox" id="toggle_storm" checked onchange="update()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="switch-row">
            <span style="font-size:0.8rem">武器補正 (幸運+6.0%)</span>
            <label class="switch">
                <input type="checkbox" id="toggle_weapon" checked onchange="update()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="info-box">
        <ul style="padding-left:15px; margin:0; list-style:none;">
            <li>・UI順序を変更しました（会心・ファスト・幸運・器用さ・万能）。</li>
            <li>・因子の効果を含めたステータス画面の実数値を入力してください。</li>
        </ul>
    </div>
</div>

<script>
    const K_GEN = 19972;
    const K_OMNI = 11200;
    const BASES = { crit: 5.0, fast: 0.0, luck: 5.0, dex: 6.0, omni: 0.0 };

    function calcRawPct(raw, k) {
        if (!raw || raw < 0) return 0;
        return Math.floor((raw / (raw + k)) * 10000) / 100;
    }

    function update() {
        const vCrit = parseFloat(document.getElementById('in_crit').value) || 0;
        const vFast = parseFloat(document.getElementById('in_fast').value) || 0;
        const vLuck = parseFloat(document.getElementById('in_luck').value) || 0;
        const vDex  = parseFloat(document.getElementById('in_dex').value) || 0;
        const vOmni = parseFloat(document.getElementById('in_omni').value) || 0;

        const rCrit = Math.max(0, Math.floor((BASES.crit + calcRawPct(vCrit, K_GEN)) * 100) / 100);
        const rFast = Math.max(0, Math.floor((BASES.fast + calcRawPct(vFast, K_GEN)) * 100) / 100);
        const rLuck = Math.max(0, Math.floor((BASES.luck + calcRawPct(vLuck, K_GEN) + (document.getElementById('toggle_weapon').checked?6:0)) * 100) / 100);
        const rDex  = Math.max(0, Math.floor((BASES.dex + calcRawPct(vDex, K_GEN)) * 100) / 100);
        const rOmni = Math.max(0, Math.floor((BASES.omni + calcRawPct(vOmni, K_OMNI)) * 100) / 100);

        document.getElementById('out_crit').innerText = rCrit.toFixed(2) + "%";
        document.getElementById('out_fast').innerText = rFast.toFixed(2) + "%";
        document.getElementById('out_luck').innerText = rLuck.toFixed(2) + "%";
        document.getElementById('out_dex').innerText = rDex.toFixed(2) + "%";
        document.getElementById('out_omni').innerText = rOmni.toFixed(2) + "%";
        
        document.getElementById('disp_speed').innerText = (rFast * (document.getElementById('toggle_storm').checked ? 1.6 : 1.0)).toFixed(2) + "%";
        document.getElementById('disp_dmg').innerText = (rOmni * 0.35).toFixed(2) + "%";
    }
    
    update();
</script>
</body>
</html>
